<!DOCTYPE html>
<html>
<head>
    <title>Callback with Promise Example</title>
</head>
<body>

    <h2>Callback + Promise Example</h2>
    <button onclick="processData(handleResult)">Run Function</button>

    <p id="output"></p>

    <script>
        // Function that accepts a callback
        function processData(callback) {
            document.getElementById("output").innerHTML = "Processing data...";

            // Create a Promise
            let promise = new Promise(function(resolve, reject) {
                let success = true; // change to false to test reject

                setTimeout(function() {
                    if (success) {
                        resolve("Data processed successfully!");
                    } else {
                        reject("Error processing data!");
                    }
                }, 1000);
            });

            // Handle Promise using then and catch
            promise
                .then(function(result) {
                    callback(null, result);
                })
                .catch(function(error) {
                    callback(error, null);
                });
        }

        // Callback function
        function handleResult(error, data) {
            if (error) {
                document.getElementById("output").innerHTML = "Callback Error: " + error;
            } else {
                document.getElementById("output").innerHTML = "Callback Success: " + data;
            }
        }
    </script>

</body>
</html>
