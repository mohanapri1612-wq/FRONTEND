<!DOCTYPE html>
<html>
    <head>
        <title>Simple Attributes Pages</title>
        <style>
            .headCls{
                color:rgb(60,119,1);
                font-size: 40px;
                text-align: center;
            }
            .paraCls{
                color:rgb(207,15,149);
                padding: 10px;
            }
            #box{
                border:2px solid red;
                width: 300px;
                padding: 15px;
            }
            .imgCls{
                border:1px solid green;
                width: 200px;
                height: 200px;
            }
        </style>
    </head>
    <body>
        <h1 class="headCls">HTML Attributes</h1>
        <div id="box">
            <p class="paraCls"title="this is tooltiptext">This paragraph uses class,id and title attribute.</p>
            <a href="https://www.google.com"target="blank">Open Google</a><br><br>
            <img src="https://via.placeholder.com/200"alt="Sample Image"class="imagCls">
        </div>
    </body>
</html>
