<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Example</title>
</head>
<body>

    <h1 id="heading">Original Heading</h1>
    <p id="para">This is a paragraph.</p>

    <button onclick="changeContent()">Click Me</button>

    <script>
        function changeContent() {
            document.getElementById("heading").innerHTML = "Heading Changed!";
            document.getElementById("para").innerHTML = "Paragraph content changed!";
            document.getElementById("heading").style.color = "blue";
            document.getElementById("heading").style.fontSize = "30px";
            document.getElementById("para").style.color = "green";
            document.getElementById("para").style.fontSize = "20px";
        }
    </script>

</body>
</html>
