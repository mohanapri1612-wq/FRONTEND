<!DOCTYPE html>
<html>
<head>
    <title>Loops Example</title>
</head>
<body>

<h2>Check output in console</h2>

<script>
for (let i = 1; i <= 10; i++) {
    console.log("For Loop:", i);
}
let j = 1;
while (j <= 5) {
    console.log("While Loop:", j);
    j++;
}
let k = 1;
do {
    console.log("Do-While Loop:", k);
    k++;
} while (k <= 3);
for (let m = 1; m <= 10; m++) {
    if (m === 5) continue; 
    if (m === 8) break;
    console.log("Continue/Break:", m);
}

</script>
</body>
</html>
