<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <h1>User Registration Form</h1>
        <form action="submit.html" method="post">
        <label for="name">Full Name:</label>
        <input type="text"id="name"name="name"required value="Enter your full name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email"name="email"required value="Enter your email"><br><br>
        <label for="password">Password:</label>
        <input type="password"id="password"name="password"required value="Enter your password"><br><br>
        <label>Gender:</label>
        <input type="radio"id="male"name="gender"value="male"required></label>
        <label for="male">Male</label>
        <input type="radio"id="female"name="gender"value="female"required></label>
        <label for="female">Female</label>
        <input type="radio"id="other"name="gender"value="other"required></label>
        <label for="other">Other</label><br><br>
        <label>Hobbies:</label>
        <input type="checkbox"id="reading"name="Hobbies"value="Reading">
        <label for="reading">Reading</label>
        <input type="checkbox"id="sports"name="Hobbies"value="Sports">
        <label for="sports">Sports</label>
        <input type="checkbox"id="music"name="Hobbies"value="Music">
        <label for="music">Music</label><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required value="Enter your age"min="18"max="60"><br><br>
        <input type="submit"value="Register">
        </form>
    </body>
</html>
