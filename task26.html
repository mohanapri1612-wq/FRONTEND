<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ES6 Output Example</title>
</head>
<body>

<h2>ES6 JavaScript Output</h2>

<div id="output"></div>

<script>

let out = "";

let name = "Mogana Priya";
const college = "Saveetha University";


let message = `My name is ${name} and I study at ${college}.`;
out += message + "<br>";

function greet(user = "Guest", age = 18) {
    out += `Hello ${user}, your age is ${age}<br>`;
}
greet();
greet("Priya", 21);



let numbers = [10, 20, 30];
let [a, b, c] = numbers;
out += `${a} ${b} ${c}<br>`;

let student = {
    sname: "Priya",
    age: 21
};
let {sname, age} = student;
out += `${sname} ${age}<br>`;


let arr1 = [1, 2, 3];
let arr2 = [...arr1];
out += `[${arr2}]<br>`;


function sum(...values) {
    let total = 0;
    for (let val of values) {
        total += val;
    }
    out += `Sum: ${total}<br>`;
}
sum(10, 20, 30);


const add = (x, y) => x + y;
out += `Addition: ${add(5, 3)}<br>`;

const square = x => x * x;
out += `Square: ${square(4)}<br>`;


class Person {
    constructor(name, age) {
        this.name = name;
        this.age = age;
    }

    display() {
        return `Name: ${this.name}, Age: ${this.age}`;
    }
}

let p1 = new Person("Priya", 21);
out += p1.display();


document.getElementById("output").innerHTML = out;

</script>

</body>
</html>
