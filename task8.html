<!DOCTYPE html>
<html>
    <head>
        <title>Lists and Tables</title>
        <style>
            table{
                border-collapse: collapse;
                border-spacing: 5px;
            }
            th,td{
                border: 2px solid black;
                padding: 10px;
            }
     </style>
    </head>
    <body>
        <h1>Shopping List</h1>
        <ul>
            <li>Rice</li>
            <li>Milk</li>
            <li>Fruits
                <ul>
                    <li>Apple</li>
                    <li>Banana</li>
                </ul>
        </li>
        <li>Bread</li>
        </ul>
        <h2>Steps to Make Tea</h2>
        <ol>
            <li>Boil water</li>
            <li>Add tea powder</li>
            <li>Add milk</li>
            <li>Add sugar</li>
            <li>Serve tea</li>
        </ol>
        <h3>Student Mark Table</h3>
        <table>
            <tr>
                <td>Name</td>
                <td>Subject</td>
                <td>Marks</td>
            </tr>
            <tr>
                <td rowspan="2"> Priya</td>
                <td>Maths</td>
                <td>90</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>85</td>
            </tr>
            <tr>
                <td colspan="2">Total</td>
                <td>175</td>
            </tr>
         </table>
    </body>
</html>
